server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── React Router fix ──────────────────────────────────────────────────────
    # Without this, refreshing /student or /teacher gives a 404.
    # We tell Nginx: if the file doesn't exist, serve index.html instead.
    # React Router then handles the URL on the client side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets for 1 year ───────────────────────────────────────
    # JS/CSS files have content hashes in their names so caching is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Disable caching for index.html ────────────────────────────────────────
    # So that new deployments are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}